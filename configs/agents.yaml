agents:
  case_structurer:
    provider: chatanywhere
    model: gpt-4.1-mini
    temperature: 0.0
    max_tokens: 32000
    response_format: json_object
    prompts:
      stage_context: src/agents/case_structurer/prompts/stage_context.md
      clinical_section: src/agents/case_structurer/prompts/clinical_section.md
      structured_item: src/agents/case_structurer/prompts/structured_item.md
  attribute_extractor:
    provider: chatanywhere
    model: gpt-4.1-mini
    temperature: 0.0
    max_tokens: 32000
    response_format: json_object
    prompts:
      attribute_span_role_labeling: src/agents/attribute_extractor/prompts/attribute_span_role_labeling.md
  evidence_atomizer:
    provider: chatanywhere
    model: gpt-4.1-mini
    temperature: 0.0
    max_tokens: 32000
    response_format: json_object
    prompts:
      clinical_assertion_labeling: src/agents/evidence_atomizer/prompts/clinical_assertion_labeling.md
      evidence_event_frame_building: src/agents/evidence_atomizer/prompts/evidence_event_frame_building.md
      evidence_atom_extraction: src/agents/evidence_atomizer/prompts/evidence_atom_extraction.md
